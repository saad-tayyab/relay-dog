# nginx/nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Hide Nginx version from response headers and error pages
    server_tokens off;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_read:10m rate=200r/m;

    # Docker internal DNS resolver — resolves service names like "api" and "web"
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name relaydog.com www.relaydog.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name relaydog.com www.relaydog.com;

        # SSL certificates (managed by certbot)
        ssl_certificate /etc/letsencrypt/live/relaydog.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/relaydog.com/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling — improves SSL performance and privacy
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API routes — rate limit applied at Nginx level
        location /api/ {
            set $api_backend http://api:3001;
            limit_req zone=api_read burst=50 nodelay;

            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Request size limit (matches bodyLimit in Hono)
            client_max_body_size 100k;
        }

        # Web app routes
        # Note: Static asset caching is handled by the web container's
        # nginx config, so we don't duplicate those headers here.
        location / {
            set $web_backend http://web:80;
            proxy_pass $web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
