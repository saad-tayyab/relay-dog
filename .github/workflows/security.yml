name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit
        run: bun audit

      - name: Install OSV Scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.0.0/osv-scanner_linux_amd64 -o osv-scanner
          echo "b60c273474aecad1158cfe1e9828f3841483701ba0fe3560517a45b2db16e84c  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner --recursive .
