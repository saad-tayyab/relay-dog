name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit
        run: bun audit

      - name: Install OSV Scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.0.0/osv-scanner_linux_amd64 -o osv-scanner
          echo "b60c273474aecad1158cfe1e9828f3841483701ba0fe3560517a45b2db16e84c  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner --recursive .
